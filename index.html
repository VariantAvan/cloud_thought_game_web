<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Thoughts</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game" hidden></canvas>

      <div id="menu-screen" class="screen">
        <h1 class="title">Cloud Thoughts</h1>
        <p class="subtitle">Press letters. Watch the clouds. Rest in the meadow.</p>
        <div class="button-group">
          <button id="btn-start" type="button" class="menu-btn">Start</button>
          <button id="btn-credits" type="button" class="menu-btn menu-btn-secondary">Credits</button>
        </div>
      </div>

      <div id="credits-screen" class="screen" hidden>
        <h2 class="credits-heading">Credits</h2>
        <div id="credits-content" class="credits-content"></div>
        <button id="btn-back" type="button" class="menu-btn">Back</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
